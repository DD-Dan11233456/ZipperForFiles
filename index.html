<!DOCTYPE html>
<html lang="en" data-version="1.0.0">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Multi-File ZIP Encryptor (v1.0.0)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/client-zip@2.4.4/index.js" type="module"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md border border-gray-700 relative">
        <h1 class="text-2xl font-bold mb-2 text-center text-indigo-400">Secure Multi-ZIP Creator</h1>
        <p class="text-xs text-gray-400 text-center mb-6">Creates standard ZIP files compatible with all desktop extractors</p>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">Select Multiple Files</label>
                <input type="file" id="fileInput" multiple 
                    class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-500 cursor-pointer bg-gray-700 rounded-lg p-2">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">ZIP File Name</label>
                <input type="text" id="zipName" value="protected_archive" placeholder="protected_archive"
                    class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">ZIP Password</label>
                <input type="password" id="password" placeholder="Enter password to lock archive"
                    class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
            </div>

            <button id="processBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-lg cursor-pointer">
                Create & Download Protected ZIP
            </button>

            <div id="status" class="text-sm text-center text-indigo-400 font-semibold hidden mt-2"></div>
        </div>

        <div class="mt-6 pt-4 border-t border-gray-700/50 flex justify-center">
            <span class="text-[10px] tracking-wider uppercase font-semibold bg-gray-900 text-gray-500 px-2.5 py-1 rounded-full border border-gray-800">
                Version 1.0.0
            </span>
        </div>
    </div>

    <script type="module">
        import { downloadZip } from "https://cdn.jsdelivr.net/npm/client-zip@2.4.4/index.js";

        document.getElementById('processBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('fileInput');
            const zipNameInput = document.getElementById('zipName');
            const passwordInput = document.getElementById('password');
            const statusDiv = document.getElementById('status');
            const processBtn = document.getElementById('processBtn');

            if (fileInput.files.length === 0) {
                alert('Please select one or more files first.');
                return;
            }
            if (!passwordInput.value) {
                alert('Please set a password.');
                return;
            }

            statusDiv.classList.remove('hidden');
            statusDiv.innerText = "Processing files...";
            processBtn.disabled = true;
            processBtn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                const files = Array.from(fileInput.files);
                const password = passwordInput.value;

                statusDiv.innerText = "Packing and encrypting archive structure...";
                
                const inputObjects = files.map(file => ({
                    name: file.name,
                    lastModified: new Date(file.lastModified),
                    input: file
                }));

                const blob = await downloadZip(inputObjects, { password: password }).blob();

                statusDiv.innerText = "Success! Initiating file save.";
                
                const downloadLink = document.createElement('a');
                let finalName = zipNameInput.value.trim() || 'protected_archive';
                if (!finalName.endsWith('.zip')) finalName += '.zip';

                downloadLink.href = URL.createObjectURL(blob);
                downloadLink.download = finalName;
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);

            } catch (error) {
                console.error(error);
                statusDiv.innerText = "Error packing archive. See browser inspector console.";
            } finally {
                processBtn.disabled = false;
                processBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
