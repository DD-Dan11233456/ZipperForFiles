<!DOCTYPE html>
<html lang="en" data-version="1.5.0">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Multi-File ZIP Encryptor (v1.5.0)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/zip.js/2.7.53/zip-full.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md border border-gray-700 relative">
        <h1 class="text-2xl font-bold mb-2 text-center text-indigo-400">Secure Multi-ZIP Creator</h1>
        <p class="text-xs text-gray-400 text-center mb-6">Drag & Drop password-protected ZIP generator</p>
        
        <div class="space-y-4">
            <div id="dropZone" class="border-2 border-dashed border-gray-600 rounded-lg p-6 text-center cursor-pointer hover:border-indigo-500 hover:bg-gray-750 transition duration-150 relative">
                <input type="file" id="fileInput" multiple class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                <div class="space-y-2 pointer-events-none">
                    <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                        <path d="M28 8H12a4 4 0 00-4 4v20a4 4 0 004 4h24a4 4 0 004-4V20m-12-4h12m-12 0l-4-4m4 4l-4 4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <p class="text-sm text-gray-300 font-medium" id="dropZoneText">Drag & Drop files here or click to browse</p>
                    <p class="text-xs text-gray-500" id="fileCounter">0 files selected</p>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">ZIP File Name</label>
                <input type="text" id="zipName" value="protected_archive" placeholder="protected_archive"
                    class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">ZIP Password</label>
                <input type="password" id="password" placeholder="Enter password to lock archive"
                    class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
            </div>

            <button id="processBtn" onclick="generateEncryptedZip()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-lg cursor-pointer">
                Create & Download Protected ZIP
            </button>

            <div id="status" class="text-sm text-center text-indigo-400 font-semibold hidden mt-2"></div>
        </div>

        <div class="mt-6 pt-4 border-t border-gray-700/50 flex justify-center">
            <span class="text-[10px] tracking-wider uppercase font-semibold bg-gray-900 text-gray-500 px-2.5 py-1 rounded-full border border-gray-800">
                Version 1.5.0
            </span>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileCounter = document.getElementById('fileCounter');
        let stagedFiles = [];

        // Drag and drop visual events
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.add('border-indigo-500', 'bg-gray-700');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.remove('border-indigo-500', 'bg-gray-700');
                if (e.type === 'drop' && e.dataTransfer.files) {
                    handleSelectedFiles(e.dataTransfer.files);
                }
            }, false);
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                handleSelectedFiles(fileInput.files);
            }
        });

        function handleSelectedFiles(filesList) {
            stagedFiles = Array.from(filesList);
            fileCounter.innerText = `${stagedFiles.length} ${stagedFiles.length === 1 ? 'file' : 'files'} selected`;
        }

        async function generateEncryptedZip() {
            const zipNameInput = document.getElementById('zipName');
            const passwordInput = document.getElementById('password');
            const statusDiv = document.getElementById('status');
            const processBtn = document.getElementById('processBtn');

            if (stagedFiles.length === 0) {
                alert('Please drag or select files first.');
                return;
            }
            if (!passwordInput.value) {
                alert('Please specify a password.');
                return;
            }

            statusDiv.classList.remove('hidden');
            statusDiv.innerText = "Initializing zip engine...";
            processBtn.disabled = true;

            try {
                // FORCE 1: Disable Web Workers to prevent file:/// origin security crashes
                zip.configure({ useWebWorkers: false });

                const blobWriter = new zip.BlobWriter("application/zip");
                
                // FORCE 2: Use Standard ZipCrypto instead of AES to prevent WebCrypto crashes on local machines
                const zipWriter = new zip.ZipWriter(blobWriter, {
                    password: passwordInput.value,
                    zipCrypto: true 
                });

                // Pack all staged files sequentially
                for (let i = 0; i < stagedFiles.length; i++) {
                    const file = stagedFiles[i];
                    statusDiv.innerText = `Encrypting file ${i + 1} of ${stagedFiles.length}: ${file.name}...`;
                    await zipWriter.add(file.name, new zip.BlobReader(file));
                }

                statusDiv.innerText = "Finalizing archive...";
                const contentBlob = await zipWriter.close();

                // Trigger standard download
                statusDiv.innerText = "Downloading protected archive...";
                const downloadLink = document.createElement('a');
                let finalName = zipNameInput.value.trim() || 'protected_archive';
                if (!finalName.endsWith('.zip')) finalName += '.zip';

                downloadLink.href = URL.createObjectURL(contentBlob);
                downloadLink.download = finalName;
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);

                statusDiv.innerText = "Success! Archive secured and saved.";
            } catch (error) {
                console.error(error);
                statusDiv.innerText = `Error: ${error.message}`;
            } finally {
                processBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
