<!DOCTYPE html>
<html lang="en" data-version="1.3.0">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Multi-File ZIP Encryptor (v1.3.0)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md border border-gray-700 relative">
        <h1 class="text-2xl font-bold mb-2 text-center text-indigo-400">Secure Multi-ZIP Creator</h1>
        <p class="text-xs text-gray-400 text-center mb-6">Outputs standard password-protected ZIP archives</p>
        
        <div class="space-y-4">
            <div id="dropZone" class="border-2 border-dashed border-gray-600 rounded-lg p-6 text-center cursor-pointer hover:border-indigo-500 hover:bg-gray-750 transition duration-150 relative">
                <input type="file" id="fileInput" multiple class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                <div class="space-y-2 pointer-events-none">
                    <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
                        <path d="M28 8H12a4 4 0 00-4 4v20a4 4 0 004 4h24a4 4 0 004-4V20m-12-4h12m-12 0l-4-4m4 4l-4 4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <p class="text-sm text-gray-300 font-medium" id="dropZoneText">Drag & Drop files here or click to browse</p>
                    <p class="text-xs text-gray-500" id="fileCounter">0 files selected</p>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">ZIP File Name</label>
                <input type="text" id="zipName" value="protected_archive" placeholder="protected_archive"
                    class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">ZIP Password</label>
                <input type="password" id="password" placeholder="Enter password to lock archive"
                    class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
            </div>

            <button id="processBtn" onclick="createStandardPasswordZip()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-lg cursor-pointer">
                Create & Download Protected ZIP
            </button>

            <div id="status" class="text-sm text-center text-indigo-400 font-semibold hidden mt-2"></div>
        </div>

        <div class="mt-6 pt-4 border-t border-gray-700/50 flex justify-center">
            <span class="text-[10px] tracking-wider uppercase font-semibold bg-gray-900 text-gray-500 px-2.5 py-1 rounded-full border border-gray-800">
                Version 1.3.0
            </span>
        </div>
    </div>

    <script>
        // Setup interactive visual states for the drag-and-drop mechanics
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileCounter = document.getElementById('fileCounter');

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.add('border-indigo-500', 'bg-gray-700');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.remove('border-indigo-500', 'bg-gray-700');
            }, false);
        });

        fileInput.addEventListener('change', () => {
            const count = fileInput.files.length;
            fileCounter.innerText = `${count} ${count === 1 ? 'file' : 'files'} selected`;
        });

        // Pack ZipCrypto keys securely
        class ZipCryptoEncoder {
            constructor(password) {
                this.keys = new Int32Array([305419896, 591751049, 878082192]);
                for (let i = 0; i < password.length; i++) {
                    this.updateKeys(password.charCodeAt(i));
                }
            }
            updateKeys(char) {
                this.keys[0] = this.crc32(this.keys[0], char);
                this.keys[1] = (this.keys[1] + (this.keys[0] & 255)) | 0;
                this.keys[1] = (Math.imul(this.keys[1], 134775813) + 1) | 0;
                this.keys[2] = this.crc32(this.keys[2], this.keys[1] >>> 24);
            }
            crc32(crc, byte) {
                crc ^= byte;
                for (let j = 0; j < 8; j++) {
                    crc = (crc >>> 1) ^ (crc & 1 ? 0xedb88320 : 0);
                }
                return crc;
            }
            encryptByte(byte) {
                const temp = (this.keys[2] & 0xffff) | 2;
                const m = ((temp * (temp ^ 1)) >>> 8) & 255;
                const encrypted = byte ^ m;
                this.updateKeys(byte);
                return encrypted;
            }
        }

        function getCRC32(data) {
            let crc = -1;
            for (let i = 0; i < data.length; i++) {
                crc = (crc >>> 8) ^ ZipCryptoEncoder.prototype.crc32(0, (crc ^ data[i]) & 255);
            }
            return (crc ^ -1) >>> 0;
        }

        async function createStandardPasswordZip() {
            const zipNameInput = document.getElementById('zipName');
            const passwordInput = document.getElementById('password');
            const statusDiv = document.getElementById('status');
            const processBtn = document.getElementById('processBtn');

            if (fileInput.files.length === 0) {
                alert('Please select or drop files first.');
                return;
            }
            if (!passwordInput.value) {
                alert('Please provide a password.');
                return;
            }

            statusDiv.classList.remove('hidden');
            statusDiv.innerText = "Processing secure file blocks...";
            processBtn.disabled = true;

            try {
                const files = fileInput.files;
                const password = passwordInput.value;
                const textEncoder = new TextEncoder();

                let localHeaders = [];
                let centralDirectoryHeaders = [];
                let overallOffset = 0;

                // Derive a valid hardcoded time signature constant (09:00:00, Jan 1st 2026) 
                // matches verification requirements without reading variable timezone drifts
                const dosTime = 0x4800; 
                const dosDate = 0x5C21;

                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const rawData = new Uint8Array(await file.arrayBuffer());
                    const nameBytes = textEncoder.encode(file.name);
                    const crc = getCRC32(rawData);

                    const cryptoEngine = new ZipCryptoEncoder(password);
                    const randHeader = crypto.getRandomValues(new Uint8Array(12));
                    
                    // CRITICAL PASSWORD FIX: Standard ZipCrypto expects the 11th index byte to match 
                    // the MSB of the file's modification time when bit-flags are evaluated.
                    randHeader[11] = (dosTime >>> 8) & 255; 

                    const encryptedPayload = new Uint8Array(12 + rawData.length);
                    for (let j = 0; j < 12; j++) encryptedPayload[j] = cryptoEngine.encryptByte(randHeader[j]);
                    for (let j = 0; j < rawData.length; j++) encryptedPayload[12 + j] = cryptoEngine.encryptByte(rawData[j]);

                    const lfh = new Uint8Array(30 + nameBytes.length);
                    const view = new DataView(lfh.buffer);
                    view.setUint32(0, 0x04034b50, true); 
                    view.setUint16(4, 20, true);         
                    view.setUint16(6, 1, true);          // General Purpose Flag 1 = encrypted data encryption matches verification
                    view.setUint16(8, 0, true);          
                    view.setUint16(10, dosTime, true);   
                    view.setUint16(12, dosDate, true);   
                    view.setUint32(14, crc, true);       
                    view.setUint32(18, encryptedPayload.length, true); 
                    view.setUint32(22, rawData.length, true);          
                    view.setUint16(26, nameBytes.length, true);        
                    view.setUint16(28, 0, true);         
                    lfh.set(nameBytes, 30);

                    const cdh = new Uint8Array(46 + nameBytes.length);
                    const cdhView = new DataView(cdh.buffer);
                    cdhView.setUint32(0, 0x02014b50, true); 
                    cdhView.setUint16(4, 20, true);         
                    cdhView.setUint16(6, 20, true);         
                    cdhView.setUint16(8, 1, true);          
                    cdhView.setUint16(10, 0, true);         
                    cdhView.setUint16(12, dosTime, true);         
                    cdhView.setUint16(14, dosDate, true);         
                    cdhView.setUint32(16, crc, true);       
                    cdhView.setUint32(20, encryptedPayload.length, true);
                    cdhView.setUint32(24, rawData.length, true);
                    cdhView.setUint16(28, nameBytes.length, true);
                    cdhView.setUint16(30, 0, true);         
                    cdhView.setUint16(32, 0, true);         
                    cdhView.setUint16(34, 0, true);         
                    cdhView.setUint16(36, 0, true);         
                    cdhView.setUint32(38, 0, true);         
                    cdhView.setUint32(42, overallOffset, true); 
                    cdh.set(nameBytes, 46);

                    localHeaders.push(lfh, encryptedPayload);
                    centralDirectoryHeaders.push(cdh);
                    overallOffset += lfh.length + encryptedPayload.length;
                }

                const cdBlob = new Blob(centralDirectoryHeaders);
                const cdBuffer = new Uint8Array(await cdBlob.arrayBuffer());

                const eocd = new Uint8Array(22);
                const eocdView = new DataView(eocd.buffer);
                eocdView.setUint32(0, 0x06054b50, true); 
                eocdView.setUint16(4, 0, true);
                eocdView.setUint16(6, 0, true);
                eocdView.setUint16(8, centralDirectoryHeaders.length, true); 
                eocdView.setUint16(10, centralDirectoryHeaders.length, true); 
                eocdView.setUint32(12, cdBuffer.length, true); 
                eocdView.setUint32(16, overallOffset, true);    
                eocdView.setUint16(20, 0, true);

                const finalZipBlob = new Blob([...localHeaders, cdBuffer, eocd], { type: "application/zip" });

                statusDiv.innerText = "Downloading encrypted archive container...";
                const downloadLink = document.createElement('a');
                let finalName = zipNameInput.value.trim() || 'protected_archive';
                if (!finalName.endsWith('.zip')) finalName += '.zip';

                downloadLink.href = URL.createObjectURL(finalZipBlob);
                downloadLink.download = finalName;
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
                
                statusDiv.innerText = "Done! Archive downloaded.";
            } catch(e) {
                console.error(e);
                statusDiv.innerText = "Packing failed.";
            } finally {
                processBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
