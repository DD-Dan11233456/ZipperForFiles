<!DOCTYPE html>
<html lang="en" data-version="1.1.0">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Multi-File ZIP Encryptor (v1.1.0)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md border border-gray-700 relative">
        <h1 class="text-2xl font-bold mb-2 text-center text-indigo-400">Secure Multi-ZIP Creator</h1>
        <p class="text-xs text-gray-400 text-center mb-6">Creates standard encrypted container compatible with browser extraction</p>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">Select Multiple Files</label>
                <input type="file" id="fileInput" multiple 
                    class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-500 cursor-pointer bg-gray-700 rounded-lg p-2">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">Archive Name</label>
                <input type="text" id="zipName" value="protected_archive" placeholder="protected_archive"
                    class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">Archive Password</label>
                <input type="password" id="password" placeholder="Enter password to lock archive"
                    class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
            </div>

            <button id="processBtn" onclick="generateSecureArchive()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-lg cursor-pointer">
                Encrypt & Download Archive
            </button>

            <div id="status" class="text-sm text-center text-indigo-400 font-semibold hidden mt-2"></div>
        </div>

        <div class="mt-6 pt-4 border-t border-gray-700/50 flex justify-center">
            <span class="text-[10px] tracking-wider uppercase font-semibold bg-gray-900 text-gray-500 px-2.5 py-1 rounded-full border border-gray-800">
                Version 1.1.0
            </span>
        </div>
    </div>

    <script>
        // Simple manual encoder to combine multiple files into a clean data package block
        function packageFiles(filesBuffers) {
            let totalLength = 0;
            filesBuffers.forEach(f => {
                totalLength += 4 + f.nameBytes.length + 4 + f.data.length;
            });

            const output = new Uint8Array(totalLength);
            let offset = 0;

            filesBuffers.forEach(f => {
                // Write name length (4 bytes)
                const nameLen = new Uint32Array([f.nameBytes.length]);
                output.set(new Uint8Array(nameLen.buffer), offset);
                offset += 4;

                // Write name string bytes
                output.set(f.nameBytes, offset);
                offset += f.nameBytes.length;

                // Write data length (4 bytes)
                const dataLen = new Uint32Array([f.data.length]);
                output.set(new Uint8Array(dataLen.buffer), offset);
                offset += 4;

                // Write data
                output.set(f.data, offset);
                offset += f.data.length;
            });

            return output;
        }

        async function generateSecureArchive() {
            const fileInput = document.getElementById('fileInput');
            const zipNameInput = document.getElementById('zipName');
            const passwordInput = document.getElementById('password');
            const statusDiv = document.getElementById('status');
            const processBtn = document.getElementById('processBtn');

            if (fileInput.files.length === 0) {
                alert('Please select one or more files first.');
                return;
            }
            if (!passwordInput.value) {
                alert('Please set a password.');
                return;
            }

            statusDiv.classList.remove('hidden');
            statusDiv.innerText = "Reading selected files...";
            processBtn.disabled = true;

            try {
                const files = fileInput.files;
                const password = passwordInput.value;
                const textEncoder = new TextEncoder();
                const filesBuffers = [];

                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const arrayBuffer = await file.arrayBuffer();
                    filesBuffers.push({
                        nameBytes: textEncoder.encode(file.name),
                        data: new Uint8Array(arrayBuffer)
                    });
                }

                statusDiv.innerText = "Bundling files together...";
                const rawPackage = packageFiles(filesBuffers);

                statusDiv.innerText = "Deriving cryptographic keys...";
                // Use Web Crypto to securely generate strong keys from the text password
                const passwordBytes = textEncoder.encode(password);
                const baseKey = await crypto.subtle.importKey(
                    "raw", passwordBytes, { name: "PBKDF2" }, false, ["deriveKey"]
                );

                const salt = crypto.getRandomValues(new Uint8Array(16));
                const key = await crypto.subtle.deriveKey(
                    { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
                    baseKey,
                    { name: "AES-GCM", length: 256 },
                    false,
                    ["encrypt"]
                );

                statusDiv.innerText = "Applying AES-GCM 256-bit encryption...";
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const encryptedData = await crypto.subtle.encrypt(
                    { name: "AES-GCM", iv: iv },
                    key,
                    rawPackage
                );

                // Structure final payload: [SALT (16B)] + [IV (12B)] + [Encrypted Data]
                const finalBlobBuffer = new Uint8Array(salt.length + iv.length + encryptedData.byteLength);
                finalBlobBuffer.set(salt, 0);
                finalBlobBuffer.set(iv, salt.length);
                finalBlobBuffer.set(new Uint8Array(encryptedData), salt.length + iv.length);

                statusDiv.innerText = "Downloading encrypted file!";
                const blob = new Blob([finalBlobBuffer], { type: "application/octet-stream" });
                
                const downloadLink = document.createElement('a');
                let finalName = zipNameInput.value.trim() || 'protected_archive';
                if (!finalName.endsWith('.enc')) finalName += '.enc';

                downloadLink.href = URL.createObjectURL(blob);
                downloadLink.download = finalName;
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);

                statusDiv.innerText = "Finished successfully.";

            } catch (error) {
                console.error(error);
                statusDiv.innerText = "Encryption process failed.";
            } finally {
                processBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
