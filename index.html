<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Multi-File ZIP Encryptor</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/zip.js/2.7.53/zip.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md border border-gray-700">
        <h1 class="text-2xl font-bold mb-2 text-center text-indigo-400">Secure Multi-ZIP Creator</h1>
        <p class="text-xs text-gray-400 text-center mb-6">Compatible with standard tools like 7-Zip, WinRAR, & OS extractors</p>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">Select Multiple Files</label>
                <input type="file" id="fileInput" multiple 
                    class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-500 cursor-pointer bg-gray-700 rounded-lg p-2">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">ZIP File Name</label>
                <input type="text" id="zipName" value="protected_archive" placeholder="protected_archive"
                    class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">ZIP Password</label>
                <input type="password" id="password" placeholder="Enter password to lock archive"
                    class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
            </div>

            <button id="processBtn" onclick="generateSecureZip()"
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-lg cursor-pointer">
                Create & Download Protected ZIP
            </button>

            <div id="status" class="text-sm text-center text-indigo-400 font-semibold hidden mt-2"></div>
        </div>
    </div>

    <script>
        async function generateSecureZip() {
            const fileInput = document.getElementById('fileInput');
            const zipNameInput = document.getElementById('zipName');
            const passwordInput = document.getElementById('password');
            const statusDiv = document.getElementById('status');
            const processBtn = document.getElementById('processBtn');

            if (fileInput.files.length === 0) {
                alert('Please select one or more files first.');
                return;
            }
            if (!passwordInput.value) {
                alert('Please set a password.');
                return;
            }

            // Setup UI Status loading states
            statusDiv.classList.remove('hidden');
            statusDiv.innerText = "Initializing engine...";
            processBtn.disabled = true;
            processBtn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                const files = fileInput.files;
                const password = passwordInput.value;

                // Create a stream target to write the zip file directly into a blob
                const blobWriter = new zip.BlobWriter("application/zip");
                const zipWriter = new zip.ZipWriter(blobWriter);

                // Loop through and append every selected file dynamically
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    statusDiv.innerText = `Adding file ${i + 1} of ${files.length}: ${file.name}...`;
                    
                    // CRITICAL FIX: Password & Encryption options must be passed per-file inside zipWriter.add()
                    await zipWriter.add(file.name, new zip.BlobReader(file), {
                        password: password,
                        zipCrypto: false // false forces strong AES-256 bit encryption on the entry
                    });
                }

                statusDiv.innerText = "Finalizing secure archive container...";
                // Close the stream and finalize metadata maps
                const finalZipBlob = await zipWriter.close();

                // Trigger seamless download link
                statusDiv.innerText = "Success! Downloading your ZIP file.";
                const downloadLink = document.createElement('a');
                let finalName = zipNameInput.value.trim() || 'protected_archive';
                if (!finalName.endsWith('.zip')) finalName += '.zip';

                downloadLink.href = URL.createObjectURL(finalZipBlob);
                downloadLink.download = finalName;
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);

            } catch (error) {
                console.error(error);
                statusDiv.innerText = "Error packing zip files. Check console logs.";
            } finally {
                processBtn.disabled = false;
                processBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }
    </script>
</body>
</html>
